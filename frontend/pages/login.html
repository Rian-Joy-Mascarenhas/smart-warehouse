<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Warehouse</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🏭 Smart Warehouse</a>
            <ul class="nav-links">
                <li><a href="register.html">Create Account</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">✓</div>
                <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Welcome Back</h1>
                <p style="color: var(--text-muted);">Sign in to continue your journey</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email or Username</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem;">👤</span>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required style="padding-left: 3rem;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem;">🔒</span>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required style="padding-left: 3rem;">
                        <button type="button" class="toggle-password" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; transition: color 0.3s;">👁️</button>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: center; margin-bottom: 0; cursor: pointer;">
                        <input type="checkbox" style="width: auto; margin-right: 0.5rem;">
                        <span style="color: var(--text-muted); font-size: 0.9rem;">Remember me</span>
                    </label>
                    <a href="#" style="color: var(--primary-color); text-decoration: none; font-weight: 600; font-size: 0.9rem;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Sign In</button>
            </form>

            <div style="text-align: center; margin: 2rem 0;">
                <p style="color: var(--text-muted); margin: 1rem 0;">or continue with</p>
                <div style="display: flex; justify-content: center; gap: 1rem;">
                    <button style="width: 50px; height: 50px; border-radius: 50%; background: rgba(51, 65, 85, 0.8); border: 1px solid var(--border-light); cursor: pointer; color: var(--text-white); font-size: 1.5rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center;">🔵</button>
                    <button style="width: 50px; height: 50px; border-radius: 50%; background: rgba(51, 65, 85, 0.8); border: 1px solid var(--border-light); cursor: pointer; color: var(--text-white); font-size: 1.5rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center;">⚫</button>
                    <button style="width: 50px; height: 50px; border-radius: 50%; background: rgba(51, 65, 85, 0.8); border: 1px solid var(--border-light); cursor: pointer; color: var(--text-white); font-size: 1.5rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center;">𝕏</button>
                </div>
            </div>

            <div class="form-link">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
        </div>
    </div>

    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
