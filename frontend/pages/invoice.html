<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Generation - Smart Warehouse</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #6366f1;
        --secondary-color: #06b6d4;
        --success-color: #10b981;
        --danger-color: #ef4444;
        --warning-color: #f59e0b;
        --light-bg: #f9fafb;
        --border-color: #e5e7eb;
        --text-dark: #1f2937;
        --text-muted: #6b7280;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: var(--text-dark);
      }

      .navbar-custom {
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.95),
          rgba(6, 182, 212, 0.95)
        );
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .navbar-custom .navbar-brand {
        font-weight: 700;
        font-size: 1.5rem;
        color: white !important;
      }

      .navbar-custom .nav-link {
        color: rgba(255, 255, 255, 0.8) !important;
        transition: color 0.3s ease;
      }

      .navbar-custom .nav-link:hover {
        color: white !important;
      }

      .container-main {
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 15px;
      }

      .card-header-custom {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        color: white;
        padding: 20px;
        border-radius: 12px 12px 0 0;
        font-weight: 600;
      }

      .card-custom {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        margin-bottom: 30px;
        overflow: hidden;
        border: none;
      }

      .form-control,
      .form-select {
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 10px 15px;
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        outline: none;
      }

      .form-label {
        font-weight: 600;
        color: var(--text-dark);
        margin-bottom: 8px;
        font-size: 0.9rem;
      }

      .btn-primary-custom {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        border: none;
        padding: 10px 25px;
        border-radius: 8px;
        font-weight: 600;
        color: white;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .btn-primary-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
      }

      .btn-secondary-custom {
        background: var(--light-bg);
        border: 1px solid var(--border-color);
        padding: 10px 25px;
        border-radius: 8px;
        font-weight: 600;
        color: var(--text-dark);
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .btn-secondary-custom:hover {
        background: var(--border-color);
      }

      .btn-icon-sm {
        width: 32px;
        height: 32px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        transition: all 0.3s ease;
      }

      .btn-remove {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger-color);
        border: none;
      }

      .btn-remove:hover {
        background: rgba(239, 68, 68, 0.2);
      }

      .items-section {
        background: var(--light-bg);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .item-row {
        background: white;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 12px;
        border: 1px solid var(--border-color);
        display: grid;
        grid-template-columns: 1fr 1fr 1fr auto;
        gap: 12px;
        align-items: end;
      }

      @media (max-width: 768px) {
        .item-row {
          grid-template-columns: 1fr;
        }
      }

      .invoice-preview {
        background: white;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 30px;
        margin-top: 20px;
      }

      .invoice-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid var(--border-color);
      }

      .company-info h2 {
        color: var(--primary-color);
        font-weight: 700;
        margin-bottom: 5px;
      }

      .company-info p {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin: 0;
      }

      .invoice-details {
        text-align: right;
      }

      .invoice-number {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--primary-color);
      }

      .invoice-date {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .invoice-table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
      }

      .invoice-table thead {
        background: var(--light-bg);
      }

      .invoice-table th {
        padding: 12px;
        text-align: left;
        font-weight: 600;
        color: var(--text-dark);
        border-bottom: 2px solid var(--border-color);
      }

      .invoice-table td {
        padding: 12px;
        border-bottom: 1px solid var(--border-color);
      }

      .invoice-table tbody tr:hover {
        background: var(--light-bg);
      }

      .text-right {
        text-align: right;
      }

      .invoice-totals {
        display: flex;
        justify-content: flex-end;
        margin-top: 20px;
      }

      .totals-box {
        width: 300px;
      }

      .total-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border-color);
        font-size: 0.95rem;
      }

      .total-row.final {
        border-bottom: none;
        background: var(--primary-color);
        color: white;
        padding: 15px;
        margin-top: 10px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 1.1rem;
      }

      .alert-custom {
        border: none;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
        display: none;
      }

      .alert-success {
        background: rgba(16, 185, 129, 0.1);
        color: var(--success-color);
      }

      .alert-danger {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger-color);
      }

      .alert-info {
        background: rgba(6, 182, 212, 0.1);
        color: var(--secondary-color);
      }

      .section-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .section-title i {
        color: var(--primary-color);
      }

      .action-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .spinner-border-sm {
        width: 1rem;
        height: 1rem;
        border-width: 0.15em;
      }

      .loading-state {
        display: none;
        text-align: center;
        padding: 20px;
      }

      .dropdown-menu {
        border: none;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .dropdown-item {
        font-weight: 500;
        color: var(--text-dark);
        padding: 10px 15px;
      }

      .dropdown-item:hover {
        background: var(--light-bg);
        color: var(--primary-color);
      }

      .modal-header {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        color: white;
      }

      .modal-header .btn-close {
        filter: invert(1);
      }

      @media print {
        body {
          background: white;
        }
        .navbar-custom,
        .action-buttons,
        .btn {
          display: none !important;
        }
        .invoice-preview {
          box-shadow: none;
          border: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">🏭 Smart Warehouse</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="../pages/dashboard.html">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="#invoice">Invoice</a>
            </li>
            <li class="nav-item">
              <button class="btn btn-light btn-sm" onclick="logout()">
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Container -->
    <div class="container-main">
      <!-- Alert Messages -->
      <div id="alertBox" class="alert-custom"></div>

      <!-- Page Title -->
      <div style="margin-bottom: 30px">
        <h1 style="color: white; font-weight: 700; margin-bottom: 5px">
          <i class="fas fa-file-invoice-dollar" style="color: #fbbf24"></i>
          Invoice Management
        </h1>
        <p style="color: rgba(255, 255, 255, 0.8); font-size: 0.95rem">
          Create, manage, and download your invoices
        </p>
      </div>

      <!-- Invoice Form Card -->
      <div class="card-custom">
        <div class="card-header-custom">
          <i class="fas fa-plus-circle"></i> Create New Invoice
        </div>
        <div style="padding: 30px">
          <!-- Customer Details Section -->
          <div class="section-title">
            <i class="fas fa-user"></i> Customer Details
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Customer Name *</label>
              <input
                type="text"
                class="form-control"
                id="customerName"
                placeholder="Enter customer name"
              />
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Email Address *</label>
              <input
                type="email"
                class="form-control"
                id="customerEmail"
                placeholder="customer@example.com"
              />
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Phone Number *</label>
              <input
                type="tel"
                class="form-control"
                id="customerPhone"
                placeholder="(555) 123-4567"
              />
            </div>
          </div>

          <!-- Products Section -->
          <div class="section-title" style="margin-top: 30px">
            <i class="fas fa-boxes"></i> Products & Items
          </div>

          <div class="items-section">
            <div id="itemsContainer">
              <!-- Items will be added here dynamically -->
            </div>
            <button class="btn btn-primary-custom" onclick="addProductRow()">
              <i class="fas fa-plus"></i> Add Product
            </button>
          </div>

          <!-- Tax Settings -->
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Tax Percentage (%)</label>
              <input
                type="number"
                class="form-control"
                id="taxPercentage"
                value="10"
                min="0"
                max="100"
              />
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="action-buttons">
            <button class="btn btn-primary-custom" onclick="generateInvoice()">
              <i class="fas fa-magic"></i> Generate Invoice
            </button>
            <button class="btn btn-secondary-custom" onclick="resetForm()">
              <i class="fas fa-redo"></i> Clear Form
            </button>
          </div>
        </div>
      </div>

      <!-- Invoice Preview Card -->
      <div class="card-custom" id="invoiceCard" style="display: none">
        <div class="card-header-custom">
          <i class="fas fa-eye"></i> Invoice Preview
        </div>
        <div class="invoice-preview" id="invoicePreview">
          <!-- Invoice will be rendered here -->
        </div>
        <div
          style="
            padding: 20px;
            background: var(--light-bg);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
          "
        >
          <button class="btn btn-primary-custom" onclick="printInvoice()">
            <i class="fas fa-print"></i> Print
          </button>
          <button class="btn btn-primary-custom" onclick="downloadPDF()">
            <i class="fas fa-download"></i> Download PDF
          </button>
          <button class="btn btn-secondary-custom" onclick="resetForm()">
            <i class="fas fa-plus"></i> Create Another
          </button>
        </div>
      </div>

      <!-- Invoices List Card -->
      <div class="card-custom">
        <div class="card-header-custom">
          <i class="fas fa-list"></i> Invoice History
        </div>
        <div style="padding: 30px">
          <div class="row mb-3">
            <div class="col-md-6">
              <input
                type="text"
                class="form-control"
                id="searchInput"
                placeholder="Search by customer name or invoice number..."
              />
            </div>
            <div class="col-md-2">
              <button
                class="btn btn-primary-custom w-100"
                onclick="searchInvoices()"
              >
                <i class="fas fa-search"></i> Search
              </button>
            </div>
          </div>
          <div id="invoicesListContainer">
            <!-- Invoices list will be rendered here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="../js/invoice.js"></script>
  </body>
</html>
