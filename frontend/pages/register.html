<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Warehouse</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">🏭 Smart Warehouse</a>
            <ul class="nav-links">
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">✨</div>
                <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Create Account</h1>
                <p style="color: var(--text-muted);">Join Smart Warehouse today</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Choose a username">
                    <div class="form-error"></div>
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                    <div class="form-error"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                    <div class="form-error"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required placeholder="Create a strong password">
                        <button type="button" class="toggle-password" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.2rem; transition: color 0.3s;">👁️</button>
                    </div>
                    <small style="color: var(--text-muted); margin-top: 0.5rem; display: block;">
                        Password must contain: 8+ chars, uppercase, lowercase, digit, special char
                    </small>
                    <div class="form-error"></div>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Create Account</button>
            </form>

            <div class="form-link">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
