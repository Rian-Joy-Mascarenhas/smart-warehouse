<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Warehouse</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Particle Canvas -->
    <canvas id="particles"></canvas>

    <!-- Floating Shapes -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
    </div>

    <!-- Register Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="card-header">
                <div class="logo">
                    <svg viewBox="0 0 100 100" width="50" height="50">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#a855f7" />
                                <stop offset="100%" style="stop-color:#ec4899" />
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logoGrad)" stroke-width="3" />
                        <path d="M50 30 L50 70 M30 50 L70 50" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round" />
                    </svg>
                </div>
                <h1>Create Account</h1>
                <p class="subtitle">Join Smart Warehouse today</p>
            </div>

            <!-- Register Form -->
            <form class="login-form" id="registerForm">
                <!-- Username Input -->
                <div class="input-group">
                    <div class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <input type="text" id="username" placeholder=" " required autocomplete="off" />
                    <label for="username">Username</label>
                    <div class="input-highlight"></div>
                </div>

                <!-- Full Name Input -->
                <div class="input-group">
                    <div class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <input type="text" id="fullName" placeholder=" " required />
                    <label for="fullName">Full Name</label>
                    <div class="input-highlight"></div>
                </div>

                <!-- Email Input -->
                <div class="input-group">
                    <div class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                    </div>
                    <input type="email" id="email" placeholder=" " required />
                    <label for="email">Email</label>
                    <div class="input-highlight"></div>
                </div>

                <!-- Password Input -->
                <div class="input-group">
                    <div class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                    <input type="password" id="password" placeholder=" " required />
                    <label for="password">Password</label>
                    <div class="input-highlight"></div>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>

                <small style="color: var(--text-muted); margin-top: -0.75rem; display: block;">
                    Password must contain: 8+ chars, uppercase, lowercase, digit, special char
                </small>

                <!-- Submit Button -->
                <button type="submit" class="login-btn" style="margin-top: 0.5rem;">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader hidden">
                        <svg class="spinner" viewBox="0 0 50 50">
                            <circle cx="25" cy="25" r="20" fill="none" stroke="white" stroke-width="4" stroke-dasharray="80" stroke-dashoffset="60" />
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Signup Link -->
            <p class="signup-link">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </div>
    </div>

    <script src="../js/particles.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
